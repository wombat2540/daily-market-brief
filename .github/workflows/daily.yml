name: Daily News Update

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 UTC 22:00 = 한국시간 오전 7시
  workflow_dispatch:         # 수동 실행 버튼도 유지

  name: Daily News Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:        # ← 이 3줄 추가
  contents: write   # ←
                    # ←
jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      ...

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install feedparser requests

      - name: 뉴스 수집 + 요약 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_news.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git commit -m "🗞️ daily update $(date +'%Y-%m-%d')" || echo "변경 없음"
          git push
