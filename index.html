<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 기사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── 라이트 토큰 ── */
:root {
  --bg:          #F6F4EF;
  --bg-sub:      #EDEAE3;
  --surface:     #FFFFFF;
  --surface-2:   #F2EFE9;
  --border:      #D8D4CA;
  --border-h:    #BAB6AC;
  --text-1:      #1C1916; /* 16:1 on white */
  --text-2:      #4B4844; /* 7:1  on white */
  --text-3:      #6E6A64; /* 4.8:1 on white */
  --up:          #B83225;
  --dn:          #1553A0;
  --up-bg:       #FDF0EE; --up-tx: #962619;
  --dn-bg:       #EAF1FC; --dn-tx: #123E80;
  --neu-bg:      #EEEEEE; --neu-tx: #3D4047;
  --sh:          0 1px 4px rgba(0,0,0,.07), 0 6px 20px rgba(0,0,0,.05);
  --sh-h:        0 4px 12px rgba(0,0,0,.10), 0 16px 40px rgba(0,0,0,.08);
  --r:           6px;
  --mw:          1080px;
  --ease:        0.3s cubic-bezier(.4,0,.2,1);
}
/* ── 다크 토큰 ── */
[data-theme="dark"] {
  --bg:          #131210;
  --bg-sub:      #1B1A17;
  --surface:     #212018;
  --surface-2:   #292820;
  --border:      #383530;
  --border-h:    #4E4B45;
  --text-1:      #F2EEE6;
  --text-2:      #B6B2A8;
  --text-3:      #7E7A72;
  --up:          #E86050;
  --dn:          #5A9AD4;
  --up-bg:       #2C1816; --up-tx: #F07868;
  --dn-bg:       #121E2E; --dn-tx: #7AB2E6;
  --neu-bg:      #282724; --neu-tx: #9EA2A8;
  --sh:          0 1px 4px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.2);
  --sh-h:        0 4px 12px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.3);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--bg);
  font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif;
  font-size: 16px;
  color: var(--text-1);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
  transition: background var(--ease), color var(--ease);
}

/* ── 헤더 ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: background var(--ease), border-color var(--ease);
}
.hd {
  max-width: var(--mw); margin: 0 auto;
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.hd-logo {
  font-size: 15px; font-weight: 700;
  color: var(--text-1); text-decoration: none; letter-spacing: -.01em;
}
.hd-right { display: flex; align-items: center; gap: 16px; }
.hd-date  { font-size: 13px; color: var(--text-3); }

/* 다크모드 토글 */
.toggle {
  width: 40px; height: 22px;
  background: var(--border); border: none; border-radius: 11px;
  cursor: pointer; position: relative; flex-shrink: 0;
  transition: background .25s;
}
.toggle::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px;
  background: var(--text-3); border-radius: 50%;
  transition: transform .25s, background .25s;
}
[data-theme="dark"] .toggle { background: var(--border-h); }
[data-theme="dark"] .toggle::after { transform: translateX(18px); background: var(--text-1); }

/* ── 티커 바 (실시간 환율) ── */
.ticker {
  background: var(--bg-sub);
  border-bottom: 1px solid var(--border);
  transition: background var(--ease);
}
.ticker-inner {
  max-width: var(--mw); margin: 0 auto;
  padding: 0 32px; height: 34px;
  display: flex; align-items: center; gap: 20px;
  overflow-x: auto; scrollbar-width: none;
}
.ticker-inner::-webkit-scrollbar { display: none; }
.t-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0; }
.t-sep  { width: 1px; height: 10px; background: var(--border); flex-shrink: 0; }
.t-lbl  { font-size: 11px; font-weight: 500; color: var(--text-3); }
.t-val  { font-size: 11px; font-weight: 600; color: var(--text-1); }
.t-chg  { font-size: 11px; font-weight: 500; }
.t-chg.up   { color: var(--up); }
.t-chg.dn   { color: var(--dn); }
.t-chg.neu  { color: var(--text-3); }
.t-loading  { font-size: 11px; color: var(--text-3); }

/* ── 히어로 ── */
.hero {
  max-width: var(--mw); margin: 0 auto;
  padding: 60px 32px 44px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  border-bottom: 1px solid var(--border);
}
.hero-eye {
  font-size: 11px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--up); margin-bottom: 10px;
}
.hero-title {
  font-size: clamp(30px, 4.2vw, 50px);
  font-weight: 700; line-height: 1.14;
  letter-spacing: -.03em; color: var(--text-1);
}
.hero-title em { font-style: normal; }
.hero-desc {
  font-size: 14px; font-weight: 400;
  color: var(--text-2); line-height: 1.75;
  text-align: right; flex-shrink: 0; max-width: 200px;
}

/* ── 그리드 ── */
.grid-wrap {
  max-width: var(--mw); margin: 0 auto;
  padding: 40px 32px;
}
.sec-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 24px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* ── 카드 ── */
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  min-height: 320px;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 36px;
  box-shadow: var(--sh);
  transition: box-shadow var(--ease), transform var(--ease),
              border-color var(--ease), background var(--ease);
  animation: fadeUp .45s ease both;
}
.card:hover {
  box-shadow: var(--sh-h);
  transform: translateY(-3px);
  border-color: var(--border-h);
}

/* 워터마크 이모티콘 */
.card-wm {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  font-size: 88px; opacity: .055;
  pointer-events: none; user-select: none; line-height: 1;
  transition: opacity var(--ease), transform var(--ease);
}
.card:hover .card-wm { opacity: .025; transform: translate(-50%, -60%) scale(1.1); }

/* 인덱스 */
.card-idx {
  position: absolute; top: 20px; right: 24px;
  font-size: 11px; font-weight: 500; color: var(--text-3);
}

/* 기본 레이어 */
.card-def {
  position: relative; z-index: 1;
  transition: opacity var(--ease), transform var(--ease);
}
.card:hover .card-def { opacity: 0; transform: translateY(6px); }

.card-kw {
  font-size: 24px; font-weight: 700;   /* ← 타이틀 24px */
  line-height: 1.28; letter-spacing: -.02em;
  color: var(--text-1); margin-bottom: 12px;
}
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-ind {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 500; color: var(--text-2);
  background: var(--surface-2); padding: 4px 10px; border-radius: 4px;
}
.card-ind::before {
  content: ''; display: block;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--card-color, var(--up)); flex-shrink: 0;
}
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600;
  padding: 4px 8px; border-radius: 4px; letter-spacing: .01em;
}
.badge.up  { background: var(--up-bg);  color: var(--up-tx); }
.badge.dn  { background: var(--dn-bg);  color: var(--dn-tx); }
.badge.neu { background: var(--neu-bg); color: var(--neu-tx); }

/* 호버 레이어 */
.card-hov {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 0;
  z-index: 2;
  padding: 28px 32px;
  display: flex; flex-direction: column; justify-content: space-between;
  background: var(--surface);
  opacity: 0; transform: translateY(8px);
  transition: opacity var(--ease), transform var(--ease);
  pointer-events: none;
}
.card:hover .card-hov { opacity: 1; transform: translateY(0); pointer-events: auto; }

.hov-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px; margin-bottom: 12px;
}
.hov-kw {
  font-size: 18px; font-weight: 700;
  letter-spacing: -.02em; color: var(--text-1); line-height: 1.3; flex: 1;
}
.card-sum { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.card-sum li {
  font-size: 13px; font-weight: 400;
  color: var(--text-2); line-height: 1.55;
  display: flex; align-items: flex-start; gap: 7px;
}
.card-sum li::before {
  content: '—'; color: var(--card-color, var(--up));
  flex-shrink: 0; font-size: 11px; margin-top: 3px; font-weight: 600;
}
.card-econ {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px; font-weight: 500; color: var(--text-3);
  display: flex; align-items: center; gap: 6px;
}
.card-econ strong { color: var(--text-2); font-weight: 600; margin-right: 2px; }

/* featured */
.card--feat { grid-column: span 2; min-height: 320px; }
.card--feat .card-kw { font-size: 28px; }
.card--feat .card-wm { font-size: 120px; }

/* ── 푸터 ── */
.foot {
  max-width: var(--mw); margin: 0 auto;
  padding: 22px 32px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.foot-note { font-size: 12px; color: var(--text-3); line-height: 1.6; }
.foot-note strong { color: var(--text-2); font-weight: 600; }

/* ── 애니메이션 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.cards .card:nth-child(1){animation-delay:.04s}
.cards .card:nth-child(2){animation-delay:.10s}
.cards .card:nth-child(3){animation-delay:.16s}
.cards .card:nth-child(4){animation-delay:.22s}
.cards .card:nth-child(5){animation-delay:.28s}
.cards .card:nth-child(6){animation-delay:.34s}

/* ── 반응형 ── */
@media(max-width:860px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .card--feat{grid-column:span 2}
}
@media(max-width:560px){
  .cards{grid-template-columns:1fr}
  .card--feat{grid-column:span 1}
  .hero{flex-direction:column;align-items:flex-start}
  .hero-desc{text-align:left;max-width:100%}
}
</style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="hd">
    <a class="hd-logo" href="#">오늘의 기사</a>
    <div class="hd-right">
      <span class="hd-date" id="hd-date"></span>
      <button class="toggle" id="toggle" aria-label="다크모드 전환"></button>
    </div>
  </div>
</header>

<!-- 실시간 환율 티커 -->
<div class="ticker">
  <div class="ticker-inner" id="ticker">
    <span class="t-loading">환율 불러오는 중…</span>
  </div>
</div>

<!-- 히어로 -->
<section class="hero">
  <div>
    <p class="hero-eye">Market Brief</p>
    <h1 class="hero-title" id="hero-title"></h1>
  </div>
  <p class="hero-desc">오늘 시장을 움직인<br>핵심 키워드 6개.<br>카드에 마우스를 올려보세요.</p>
</section>

<!-- 카드 그리드 -->
<div class="grid-wrap">
  <p class="sec-label">Today's Keywords — 6 topics</p>
  <div class="cards" id="cards"></div>
</div>

<!-- 푸터 -->
<footer class="foot">
  <p class="foot-note"><strong>면책 고지</strong><br>본 서비스는 AI가 요약한 뉴스 정보로, 투자 권유가 아닙니다.</p>
  <p class="foot-note" style="text-align:right">자동 업데이트 · 매일 오전 7시<br><strong>오늘의 기사</strong></p>
</footer>

<script>
/* ── 샘플 데이터 (운영 시 fetch('./data/today.json')으로 교체) ── */
const NEWS_DATA = [
  {
    keyword:"AI 반도체 전쟁", industry:"반도체 · 전자", emoji:"🔬",
    color:"#2563EB", featured:true, dir:"up", dirLabel:"▲ 상승 전망",
    econ:"HBM4 공급가 +18% · 엔비디아 +2.4%",
    summary:[
      "엔비디아·TSMC 수주 경쟁 격화로 HBM 메모리 공급 부족이 지속됩니다.",
      "SK하이닉스·삼성전자 HBM4 양산 일정이 업계 최대 관심사로 부상했습니다.",
      "미국의 대중 반도체 수출 규제 강화로 국내 기업의 반사이익 기대가 높아집니다."
    ]
  },
  {
    keyword:"금리 동결 신호", industry:"채권 · 금융", emoji:"🏛️",
    color:"#059669", featured:false, dir:"up", dirLabel:"▲ 채권 강세",
    econ:"미 10년물 4.21% ↓ · 원/달러 1,372원",
    summary:[
      "연준 의사록에서 '추가 인상 불필요' 기조가 확인돼 채권 시장이 안정됐습니다.",
      "국내 기준금리 인하 시점이 3분기로 앞당겨질 수 있다는 전망이 나왔습니다.",
      "금리 민감 업종인 부동산 리츠·건설주가 일제히 강세를 보였습니다."
    ]
  },
  {
    keyword:"전기차 수요 둔화", industry:"자동차 · 배터리", emoji:"🔋",
    color:"#D97706", featured:false, dir:"dn", dirLabel:"▼ 하락 압력",
    econ:"테슬라 -4.1% · LG에너지솔루션 -2.8%",
    summary:[
      "테슬라 1분기 인도량이 시장 예상치를 14% 하회해 배터리 업종 전반이 약세입니다.",
      "국내 배터리 3사의 수주 공백 우려가 주가에 반영됐습니다.",
      "반면 하이브리드차 부품 수요는 오히려 증가 추세라 관련주는 견조합니다."
    ]
  },
  {
    keyword:"바이오 임상 급등", industry:"바이오 · 헬스케어", emoji:"💊",
    color:"#7C3AED", featured:false, dir:"up", dirLabel:"▲ 강한 상승",
    econ:"비만치료제 섹터 +6.2% · FDA 패스트트랙",
    summary:[
      "국내 A사 비만치료제 임상 2상 결과가 긍정적으로 발표돼 급등세를 보였습니다.",
      "글로벌 제약사의 기술이전 협상 소식이 투자심리를 자극하고 있습니다.",
      "FDA 패스트트랙 지정으로 허가 일정이 1년 단축될 전망입니다."
    ]
  },
  {
    keyword:"달러 강세 지속", industry:"환율 · 원자재", emoji:"💱",
    color:"#C8392B", featured:false, dir:"neu", dirLabel:"— 혼조세",
    econ:"DXY 104.8 · 금 $2,412 · WTI $81.3",
    summary:[
      "달러 인덱스가 1년래 최고치를 기록하며 원·달러 환율이 1,380원을 돌파했습니다.",
      "수출 대기업은 환차익 기대감이 있으나, 원자재 수입 업종의 원가 부담이 심화됩니다.",
      "금 가격은 안전자산 수요로 온스당 2,400달러를 상회합니다."
    ]
  },
  {
    keyword:"데이터센터 붐", industry:"클라우드 · 인프라", emoji:"🖥️",
    color:"#0891B2", featured:false, dir:"up", dirLabel:"▲ 상승 전망",
    econ:"전력 인프라 섹터 +3.1% · 냉각장비 수혜",
    summary:[
      "MS·구글이 아시아 데이터센터 투자를 두 배로 늘린다고 발표했습니다.",
      "국내 전력 인프라·냉각 장비·케이블 업체들이 직접 수혜주로 주목받습니다.",
      "데이터센터 전력 소비 급증으로 국내 전력 관련 종목에도 관심이 쏠립니다."
    ]
  }
];

/* ── 날짜 ── */
const now = new Date();
const yy = now.getFullYear();
const mm = String(now.getMonth()+1).padStart(2,'0');
const dd = String(now.getDate()).padStart(2,'0');
const dayKr = ['일','월','화','수','목','금','토'][now.getDay()];
document.getElementById('hd-date').textContent = `${yy}.${mm}.${dd} ${dayKr}요일`;
document.getElementById('hero-title').innerHTML = `${yy}.<em>${mm}</em>.${dd}<br>오늘의 기사`;

/* ── 실시간 환율 (frankfurter.app 무료 API) ── */
async function loadTicker() {
  const wrap = document.getElementById('ticker');
  try {
    // KRW 기준 주요 통화 + 별도로 USD/KRW
    const [res1, res2] = await Promise.all([
      fetch('https://api.frankfurter.app/latest?from=USD&to=KRW,JPY,EUR'),
      fetch('https://api.frankfurter.app/latest?from=EUR&to=KRW')
    ]);
    const d1 = await res1.json();
    const d2 = await res2.json();

    const usdKrw  = d1.rates.KRW;
    const eurKrw  = d2.rates.KRW;
    const jpyKrw  = (d1.rates.KRW / d1.rates.JPY * 100).toFixed(2); // 100엔 기준

    const items = [
      { lbl:'원/달러', val: usdKrw.toLocaleString('ko',{maximumFractionDigits:2}), chg:'실시간', dir:'neu' },
      { lbl:'원/100엔', val: jpyKrw.toLocaleString('ko',{maximumFractionDigits:2}), chg:'실시간', dir:'neu' },
      { lbl:'원/유로',  val: eurKrw.toLocaleString('ko',{maximumFractionDigits:2}), chg:'실시간', dir:'neu' },
    ];

    wrap.innerHTML = items.map((it, i) => `
      ${i > 0 ? '<span class="t-sep"></span>' : ''}
      <span class="t-item">
        <span class="t-lbl">${it.lbl}</span>
        <span class="t-val">${it.val}</span>
        <span class="t-chg ${it.dir}">${it.chg}</span>
      </span>
    `).join('') + `
      <span class="t-sep"></span>
      <span class="t-item"><span class="t-lbl" style="font-size:10px;opacity:.7">Frankfurter API 제공</span></span>
    `;
  } catch(e) {
    wrap.innerHTML = '<span class="t-loading">환율 정보를 불러올 수 없습니다</span>';
  }
}
loadTicker();

/* ── 카드 렌더 ── */
function renderCards(data) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  data.forEach((item, i) => {
    const card = document.createElement('article');
    card.className = 'card' + (item.featured ? ' card--feat' : '');
    card.style.setProperty('--card-color', item.color);
    card.innerHTML = `
      <span class="card-idx">${String(i+1).padStart(2,'0')}</span>
      <div class="card-wm">${item.emoji}</div>
      <div class="card-def">
        <h2 class="card-kw">${item.keyword}</h2>
        <div class="card-meta">
          <span class="card-ind">${item.industry}</span>
          <span class="badge ${item.dir}">${item.dirLabel}</span>
        </div>
      </div>
      <div class="card-hov">
        <div class="hov-top">
          <p class="hov-kw">${item.keyword}</p>
          <span class="badge ${item.dir}">${item.dirLabel}</span>
        </div>
        <ul class="card-sum">
          ${item.summary.map(s=>`<li>${s}</li>`).join('')}
        </ul>
        ${item.econ ? `<div class="card-econ"><strong>핵심 지표</strong>${item.econ}</div>` : ''}
      </div>
    `;
    container.appendChild(card);
  });
}

renderCards(NEWS_DATA);

/* ── 다크모드 ── */
const html = document.documentElement;
const btn  = document.getElementById('toggle');
const saved = localStorage.getItem('theme');
if (saved) html.setAttribute('data-theme', saved);
else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
  html.setAttribute('data-theme','dark');
btn.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
