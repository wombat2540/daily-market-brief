<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 기사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ── 토큰 ───────────────────────────────────────── */
:root {
  /* 라이트 모드 - 웹접근성 4.5:1 이상 보장 */
  --bg:           #F5F4F0;
  --bg-sub:       #ECEAE4;
  --surface:      #FFFFFF;
  --surface-2:    #F0EEE8;
  --border:       #D6D2C8;
  --border-hover: #B8B4A8;

  --text-main:    #1A1916;   /* on white: 16.2:1 */
  --text-sub:     #4A4740;   /* on white: 7.1:1  */
  --text-muted:   #6B6760;   /* on white: 4.8:1  */

  --accent-up:    #C0392B;   /* 상승장 레드 */
  --accent-dn:    #1A56A0;   /* 하락장 블루 */
  --accent-neu:   #5C6370;   /* 중립 */

  --tag-up-bg:    #FEF0EE;
  --tag-up-text:  #9B2218;
  --tag-dn-bg:    #EBF2FC;
  --tag-dn-text:  #154080;
  --tag-neu-bg:   #EFEFEF;
  --tag-neu-text: #3A3D42;

  --shadow-card:  0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-hover: 0 4px 8px rgba(0,0,0,0.09), 0 12px 32px rgba(0,0,0,0.08);

  --radius: 6px;
  --max-w: 1080px;
  --transition: 0.32s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg:           #141412;
  --bg-sub:       #1C1B18;
  --surface:      #222220;
  --surface-2:    #2A2926;
  --border:       #3A3835;
  --border-hover: #504E4A;

  --text-main:    #F0EDE6;   /* on #222: 13.8:1 */
  --text-sub:     #B8B4AA;   /* on #222: 6.2:1  */
  --text-muted:   #807C74;   /* on #222: 4.6:1  */

  --accent-up:    #E8614F;
  --accent-dn:    #5B9BD5;
  --accent-neu:   #9096A0;

  --tag-up-bg:    #2E1A18;
  --tag-up-text:  #F08070;
  --tag-dn-bg:    #142030;
  --tag-dn-text:  #80B4E8;
  --tag-neu-bg:   #2A2926;
  --tag-neu-text: #A0A4AA;

  --shadow-card:  0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-hover: 0 4px 8px rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.3);
}

/* ── 리셋 ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  font-size: 16px;
  color: var(--text-main);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition), color var(--transition);
}

/* ── 헤더 ───────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition), border-color var(--transition);
}

.header-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-main);
  text-decoration: none;
  letter-spacing: -0.01em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-date {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}

/* 다크모드 토글 */
.theme-toggle {
  width: 40px;
  height: 22px;
  background: var(--border);
  border: none;
  border-radius: 11px;
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}

.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: transform 0.25s, background 0.25s;
}

[data-theme="dark"] .theme-toggle::after {
  transform: translateX(18px);
  background: var(--text-main);
}

[data-theme="dark"] .theme-toggle {
  background: var(--border-hover);
}

/* ── 환율 바 ─────────────────────────────────────── */
.ticker-bar {
  background: var(--bg-sub);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  transition: background var(--transition);
}

.ticker-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  height: 36px;
  display: flex;
  align-items: center;
  gap: 24px;
  overflow-x: auto;
  scrollbar-width: none;
}

.ticker-inner::-webkit-scrollbar { display: none; }

.ticker-item {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}

.ticker-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
}

.ticker-value {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-main);
}

.ticker-change {
  font-size: 11px;
  font-weight: 500;
}

.ticker-change.up   { color: var(--accent-up); }
.ticker-change.down { color: var(--accent-dn); }
.ticker-change.neu  { color: var(--text-muted); }

.ticker-divider {
  width: 1px;
  height: 12px;
  background: var(--border);
  flex-shrink: 0;
}

/* ── 히어로 ─────────────────────────────────────── */
.hero {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 56px 24px 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-up);
  margin-bottom: 10px;
}

.hero-title {
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--text-main);
}

.hero-title em {
  font-style: normal;
  color: var(--accent-up);
}

.hero-desc {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-sub);
  line-height: 1.7;
  text-align: right;
  flex-shrink: 0;
  max-width: 220px;
}

/* ── 그리드 ─────────────────────────────────────── */
.grid-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 36px 24px;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ── 카드 ───────────────────────────────────────── */
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 24px;
  box-shadow: var(--shadow-card);
  transition:
    box-shadow var(--transition),
    transform var(--transition),
    border-color var(--transition),
    background var(--transition);
  animation: fadeUp 0.45s ease both;
}

.card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-3px);
  border-color: var(--border-hover);
}

/* 워터마크 */
.card-watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -62%);
  font-size: 80px;
  opacity: 0.06;
  pointer-events: none;
  user-select: none;
  line-height: 1;
  transition: opacity var(--transition), transform var(--transition);
}

.card:hover .card-watermark {
  opacity: 0.03;
  transform: translate(-50%, -62%) scale(1.08);
}

/* 인덱스 */
.card-index {
  position: absolute;
  top: 18px;
  right: 20px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* 기본 레이어 */
.card-default {
  position: relative;
  z-index: 1;
  transition: opacity var(--transition), transform var(--transition);
}

.card:hover .card-default {
  opacity: 0;
  transform: translateY(5px);
}

.card-keyword {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--text-main);
  margin-bottom: 10px;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.card-industry {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  background: var(--surface-2);
  padding: 3px 8px;
  border-radius: 3px;
}

.card-industry::before {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--card-color, var(--accent-up));
  flex-shrink: 0;
}

/* 방향 태그 */
.card-direction {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 0.02em;
}

.card-direction.up  { background: var(--tag-up-bg);  color: var(--tag-up-text); }
.card-direction.dn  { background: var(--tag-dn-bg);  color: var(--tag-dn-text); }
.card-direction.neu { background: var(--tag-neu-bg); color: var(--tag-neu-text); }

/* 호버 레이어 */
.card-hover {
  position: absolute;
  inset: 0;
  z-index: 2;
  padding: 20px 24px 24px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity var(--transition), transform var(--transition);
  pointer-events: none;
  background: var(--surface);
}

.card:hover .card-hover {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.card-hover-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 14px;
}

.card-hover-keyword {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-main);
  line-height: 1.3;
  flex: 1;
}

.card-hover-direction {
  flex-shrink: 0;
  margin-top: 2px;
}

/* 요약 리스트 */
.card-summary {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 9px;
  flex: 1;
}

.card-summary li {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-sub);
  line-height: 1.6;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.card-summary li::before {
  content: '—';
  color: var(--card-color, var(--accent-up));
  flex-shrink: 0;
  font-size: 11px;
  margin-top: 3px;
  font-weight: 600;
}

/* 핵심 경제 지표 */
.card-econ {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-econ strong {
  color: var(--text-sub);
  font-weight: 600;
}

/* featured 카드 */
.card--featured {
  grid-column: span 2;
  min-height: 240px;
}

.card--featured .card-keyword {
  font-size: 26px;
}

.card--featured .card-watermark {
  font-size: 110px;
}

/* ── 하단 ───────────────────────────────────────── */
.footer {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.footer-note {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  line-height: 1.6;
}

.footer-note strong {
  color: var(--text-sub);
  font-weight: 600;
}

/* ── 애니메이션 ──────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cards-grid .card:nth-child(1) { animation-delay: 0.04s; }
.cards-grid .card:nth-child(2) { animation-delay: 0.10s; }
.cards-grid .card:nth-child(3) { animation-delay: 0.16s; }
.cards-grid .card:nth-child(4) { animation-delay: 0.22s; }
.cards-grid .card:nth-child(5) { animation-delay: 0.28s; }
.cards-grid .card:nth-child(6) { animation-delay: 0.34s; }

/* ── 반응형 ─────────────────────────────────────── */
@media (max-width: 860px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
  .card--featured { grid-column: span 2; }
}

@media (max-width: 560px) {
  .cards-grid { grid-template-columns: 1fr; }
  .card--featured { grid-column: span 1; }
  .hero { flex-direction: column; align-items: flex-start; }
  .hero-desc { text-align: left; max-width: 100%; }
}
</style>
</head>

/* ──────────────────────────────────────
   날짜
   ────────────────────────────────────── */
function getTodayKr() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const days = ['일','월','화','수','목','금','토'];
  const day = days[now.getDay()];
  return { y, m, d, day };
}

const { y, m, d, day } = getTodayKr();
document.getElementById('header-date').textContent = `${y}.${m}.${d} ${day}요일`;
document.getElementById('hero-title').innerHTML = `${y}.<em>${m}</em>.${d}<br>오늘의 기사`;

/* ──────────────────────────────────────
   환율 바 렌더
   ────────────────────────────────────── */
function renderTicker(data) {
  const wrap = document.getElementById('ticker-inner');
  wrap.innerHTML = data.map((item, i) => `
    ${i > 0 ? '<span class="ticker-divider"></span>' : ''}
    <span class="ticker-item">
      <span class="ticker-label">${item.label}</span>
      <span class="ticker-value">${item.value}</span>
      <span class="ticker-change ${item.dir === 'up' ? 'up' : item.dir === 'down' ? 'down' : 'neu'}">${item.change}</span>
    </span>
  `).join('');
}

renderTicker(TICKER_DATA);

/* ──────────────────────────────────────
   카드 렌더
   ────────────────────────────────────── */
function renderCards(data) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  data.forEach((item, i) => {
    const dirClass = item.direction || 'neu';
    const card = document.createElement('article');
    card.className = 'card' + (item.featured ? ' card--featured' : '');
    card.style.setProperty('--card-color', item.color);

    card.innerHTML = `
      <span class="card-index">${String(i+1).padStart(2,'0')}</span>
      <div class="card-watermark">${item.emoji}</div>

      <div class="card-default">
        <h2 class="card-keyword">${item.keyword}</h2>
        <div class="card-meta">
          <span class="card-industry">${item.industry}</span>
          <span class="card-direction ${dirClass}">${item.dirLabel}</span>
        </div>
      </div>

      <div class="card-hover">
        <div class="card-hover-header">
          <p class="card-hover-keyword">${item.keyword}</p>
          <span class="card-direction ${dirClass} card-hover-direction">${item.dirLabel}</span>
        </div>
        <ul class="card-summary">
          ${item.summary.map(s => `<li>${s}</li>`).join('')}
        </ul>
        ${item.econ ? `<div class="card-econ"><strong>핵심 지표</strong>${item.econ}</div>` : ''}
      </div>
    `;

    container.appendChild(card);
  });
}

renderCards(NEWS_DATA);

/* ──────────────────────────────────────
   다크모드 토글
   ────────────────────────────────────── */
const html = document.documentElement;
const toggleBtn = document.getElementById('theme-toggle');

// 시스템 설정 감지
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  html.setAttribute('data-theme', 'dark');
}

// 로컬스토리지 저장값 우선
const saved = localStorage.getItem('theme');
if (saved) html.setAttribute('data-theme', saved);

toggleBtn.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
